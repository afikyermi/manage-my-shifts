<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Manage My Shifts - הוספה/עדכון משמרת</title>
    <script src="js/utils.js" defer></script>
    <script src="js/add-update-shift.js" defer></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/add-shift-update.css">
</head>
<body>
    <header>
        <h1>Manage My Shifts</h1>
        <h2>הוספה / עדכון משמרת</h2>
    </header>

<nav>
        <div class="nav-right">
            שלום, <span id="currentUserName"></span>
        </div>

        <ul class="nav-center">
            <li><a href="shifts.html">משמרות</a></li>
            <li><a href="profile-update.html">עריכת פרופיל</a></li>
            <li><a href="add-update-shift.html">הוספת משמרת</a></li>
            <li><a href="resume-update.html">קורות חיים</a></li>
        </ul>

        <div class="nav-left">
            <button type="button" id="logoutButton">התנתק</button>
        </div>
    </nav>

    <main>
        <section>
            <h3>פרטי משמרת</h3>
            <form id="shiftForm">
                <div>
                    <label for="shiftDate">תאריך:</label>
                    <input type="date" id="shiftDate" name="date">
                </div>

                <div>
                    <label for="startTime">שעת התחלה:</label>
                    <input type="time" id="startTime" name="startTime">
                </div>

                <div>
                    <label for="endTime">שעת סיום:</label>
                    <input type="time" id="endTime" name="endTime">
                </div>

                <div>
                    <label for="hourlyWage">שכר שעתי:</label>
                    <input type="number" id="hourlyWage" name="hourlyWage">
                </div>

                <div>
                    <label for="shiftRole">תפקיד:</label>
                    <input type="text" id="shiftRole" name="role">
                </div>

                <div>
                    <label for="shiftBranch">סניף:</label>
                    <select id="shiftBranch" name="branch">
                        <option value="">בחר סניף</option>
                        <option value="tel-aviv">ת"א</option>
                        <option value="haifa">חיפה</option>
                        <option value="jerusalem">ירושלים</option>
                        <option value="beer-sheva">ב"ש</option>
                        <option value="eilat">אילת</option>
                        <option value="raanana">רעננה</option>
                        <option value="kiryat-gat">קרית גת</option>
                    </select>
                </div>

                <div>
                <label for="comments">הערות:</label>
                <textarea id="comments" rows="3" placeholder="הערות מיוחדות למשמרת (אופציונלי)"></textarea>
                </div>

                <div>
                    <button type="submit">שמירה</button>
                </div>
            </form>
        </section>
    </main>
    
</body>
</html>
