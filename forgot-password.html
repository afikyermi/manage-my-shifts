<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage My Shifts - שחזור סיסמה</title>
    <script src="js/utils.js" defer></script>
    <script src="js/forgot-password.js" defer></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/forgot-password.css">
</head>
<body>
    <header>
        <h1>Manage My Shifts</h1>
        <h2>שחזור סיסמה</h2>
    </header>

    <main>
        <form id="forgotPasswordForm" novalidate>
            <div>
                <label for="fpUsername">שם משתמש:</label>
                <input type="text" id="fpUsername" name="username" autocomplete="username">
                <span id="fpUsernameError" class="field-error"></span>
            </div>

            <div>
                <label for="fpEmail">מייל:</label>
                <input type="email" id="fpEmail" name="email" autocomplete="email">
                <span id="fpEmailError" class="field-error"></span>
            </div>

            <div>
                <label for="fpIdLast4">4 ספרות אחרונות של תעודת הזהות:</label>
                <input type="password" id="fpIdLast4" name="idLast4" maxlength="4" inputmode="numeric">
                <span id="fpIdLast4Error" class="field-error"></span>
            </div>

            <div>
                <label for="fpNewPassword">סיסמה חדשה:</label>
                <input type="password" id="fpNewPassword" name="newPassword" autocomplete="new-password">
                <span id="fpNewPasswordError" class="field-error"></span>
            </div>

            <div>
                <label for="fpConfirmNewPassword">אימות סיסמה חדשה:</label>
                <input type="password" id="fpConfirmNewPassword" name="confirmNewPassword" autocomplete="new-password">
                <span id="fpConfirmNewPasswordError" class="field-error"></span>
            </div>

            <div>
                <span id="fpGeneralMessage" class="form-message"></span>
            </div>

            <div>
                <button type="submit">איפוס סיסמה</button>
            </div>
        </form>

        <hr>

        <p>
            נזכרת בסיסמה?
            <a href="index.html">חזור לכניסה</a>
        </p>
    </main>
</body>
</html>
